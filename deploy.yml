name: Healthcare Analytics CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-data:
    name: Validate Healthcare Dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install pandas
      - run: python tests/test_data_quality.py

  test-r-app:
    name: Test R Shiny Application
    runs-on: ubuntu-latest
    needs: validate-data
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.1"
      - run: |
          Rscript -e "install.packages(c(
            'shiny','shinydashboard','ggplot2',
            'dplyr','tidyr','lubridate','plotly',
            'readr','DT','scales','forcats'),
            repos='https://cran.rstudio.com/')"
      - run: Rscript -e "parse(file='healthcare_dashboard.R'); cat('R syntax OK\n')"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-r-app
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t healthcare-analytics:latest .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Confirm deployment
        run: |
          echo "Deploying healthcare-analytics:latest"
          echo "Dashboard URL: http://localhost:3838/app"
